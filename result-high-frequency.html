<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Swisse 防伪查询结果</title>
    <link rel="stylesheet" href="assets/styles.css" />
  </head>
  <body data-page="result" data-result="high">
    <div class="site">
      <header class="brand-bar" aria-label="Swisse">
        <img src="assets/head.png" alt="Swisse 斯维诗" />
      </header>

      <main class="content result-content">
        <h1>高频查询，谨防假冒</h1>
        <div class="result-message">
          <span class="status-icon danger-icon" aria-hidden="true"></span>
          <p>该产品查询次数超过<span class="danger-text">10</span>次！如标签涂层未刮开，则产品为仿冒产品</p>
        </div>
        <div class="result-actions">
          <button class="primary-button" type="button" data-action="back">返回</button>
          <button class="outline-button" type="button" data-action="service">联系客服</button>
        </div>
      </main>
    </div>

    <script src="assets/app.js"></script>
  </body>
</html>
